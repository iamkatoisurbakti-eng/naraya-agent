<div style="display:flex;justify-content:center;align-items:center;padding:2rem 0;background:#f2f2f2;">
  <div id="news-card" style="width:360px;height:450px;background:#111111;position:relative;overflow:hidden;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.22);isolation:isolate;">
    <!-- Seedance should fill only the transparent top slot below -->
    <div id="news-image-slot" style="position:absolute;top:0;left:0;right:0;height:276px;background:transparent;border-bottom:1px solid rgba(255,255,255,0.08);z-index:1;"></div>
    <div style="position:absolute;top:0;bottom:0;left:0;width:8px;background:#E8000D;z-index:4;"></div>
    <div style="position:absolute;left:0;right:0;bottom:0;height:174px;padding:20px 20px 18px 24px;background:linear-gradient(180deg, rgba(17,17,17,0.96) 0%, rgba(17,17,17,1) 100%);z-index:5;box-sizing:border-box;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="width:8px;height:8px;border-radius:999px;background:#E8000D;"></div>
        <div style="font-family:Arial,sans-serif;font-size:9px;font-weight:800;color:#ff8a8f;letter-spacing:3px;text-transform:uppercase;">GEN-Z NEWS</div>
      </div>
      <div id="news-title" style="font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:700;color:#ffffff;line-height:1.18;margin-bottom:12px;border-left:4px solid #E8000D;padding-left:14px;">Tulis Judul Berita Anda Di Sini</div>
      <div id="news-summary" style="font-family:Georgia,serif;font-size:11px;color:#c7c7c7;line-height:1.55;padding-left:18px;margin-bottom:14px;">Tambahkan deskripsi singkat di sini.</div>
    </div>
  </div>
</div>
